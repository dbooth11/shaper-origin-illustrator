<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shaper Output</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="panel">
    <section>
      <div class="label cut-header">
        <span>Cut</span><span>Fill / Stroke</span>
      </div>
      <button class="cut" data-cut="interior">
        <span class="sw" style="background:#fff;border:2px solid #000"></span>
        <span class="name">Interior</span><span class="vals">#FFFFFF / #000000</span>
      </button>
      <button class="cut" data-cut="exterior">
        <span class="sw" style="background:#000;border:2px solid #000"></span>
        <span class="name">Exterior</span><span class="vals">#000000 / #000000</span>
      </button>
      <button class="cut" data-cut="online">
        <span class="sw" style="background:transparent;border:2px solid #7f7f7f"></span>
        <span class="name">On-line</span><span class="vals">none / #7F7F7F</span>
      </button>
      <button class="cut" data-cut="pocket">
        <span class="sw" style="background:#7f7f7f;border:2px solid #7f7f7f"></span>
        <span class="name">Pocket</span><span class="vals">#7F7F7F / none</span>
      </button>
      <button class="cut" data-cut="guide">
        <span class="sw" style="background:transparent;border:2px solid #0068ff"></span>
        <span class="name">Guide</span><span class="vals">none / #0068FF</span>
      </button>
    </section>

    <section>
      <div class="label">Cut Depth</div>
      <div class="row">
        <input id="depthVal" type="number" step="0.01" min="0" placeholder="0.25" inputmode="decimal">
        <select id="depthUnit">
          <option value="in">in</option>
          <option value="mm">mm</option>
        </select>
      </div>
      <div class="row">
        <button id="applyDepth" class="ghost">Set Depth</button>
        <button id="clearDepth" class="ghost">Clear</button>
      </div>
    </section>

    <button id="exportBtn" class="primary">Export SVG</button>

    <div id="status" class="status">Select path(s), pick a cut type.</div>
  </div>

  <script src="CSInterface.js"></script>
  <script src="main.js"></script>
</body>
</html>
